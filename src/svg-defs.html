<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- Stick base ring; subtle dark disc that frames the motion -->
    <g id="stick-base">
      <circle cx="16" cy="16" r="14.5" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <circle cx="16" cy="16" r="1.4" fill="rgba(255,255,255,0.25)"/>
    </g>

  </defs>

  <!-- 8-direction layout (viewBox 32x32):
       1 (6,26)  2 (16,26)  3 (26,26)
       4 (6,16)  5 (16,16)  6 (26,16)
       7 (6,6)   8 (16,6)   9 (26,6)   -->

  <!-- 236 (QCF) — ends at 6 (forward), arrow points right -->
  <symbol id="m-qcf" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M16,26 Q26,26 26,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 214 (QCB) — ends at 4 (back), arrow points left -->
  <symbol id="m-qcb" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M16,26 Q6,26 6,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10,11 L2,16 L10,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 623 (DP) — ends at 3 (down-forward), arrow points down-right -->
  <symbol id="m-dp" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M26,16 L16,26 L26,26" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30,22 L30,30 L22,30 Z" fill="currentColor"/>
  </symbol>

  <!-- 41236 (HCF) — ends at 6 (forward), arrow points right -->
  <symbol id="m-hcf" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M6,16 Q6,26 16,26 Q26,26 26,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 632146 (HCB → F) — half-circle back along the BOTTOM
       semicircle (lever sweeps through 3, 2, 1), then a forward
       thrust back to 6 with an explicit arrowhead. -->
  <symbol id="m-hcb-f" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <!-- HCB arc: 6 → 3 → 2 → 1 → 4 (sweep flag 1 = clockwise = bottom) -->
    <path d="M26,16 A10,10 0 0 1 6,16" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
    <!-- Forward thrust 4 → 6 -->
    <path d="M8,16 L24,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"/>
    <!-- End arrowhead at 6 -->
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 236236 — handled in markup as a single QCF icon plus an
       external "×2" repeat token. -->
  <symbol id="m-qcf2" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M16,26 Q26,26 26,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- ←/→ direction (throw etc.) — both ends are arrowheads -->
  <symbol id="m-dir" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M8,16 L24,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
    <path d="M10,11 L2,16 L10,21 Z" fill="currentColor"/>
  </symbol>

  <!-- Generic button (no motion) -->
  <symbol id="m-button" viewBox="0 0 32 32">
    <circle cx="16" cy="16" r="11" fill="rgba(255,255,255,0.025)" stroke="currentColor" stroke-width="1.6" opacity="0.5"/>
    <circle cx="16" cy="16" r="5.5" fill="currentColor"/>
    <circle cx="16" cy="16" r="2" fill="rgba(255,255,255,0.85)"/>
  </symbol>

  <!-- 22 (down-down) — two parallel down arrows. Used by moves
       like Dizzy 光の翼, Asuka マナ回復, Jam 朝凪の呼吸. -->
  <symbol id="m-down2" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M11,8 L11,21" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <path d="M7,18 L11,24 L15,18 Z" fill="currentColor"/>
    <path d="M21,8 L21,21" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <path d="M17,18 L21,24 L25,18 Z" fill="currentColor"/>
  </symbol>

  <!-- 4溜め6 (back-charge → forward) — Sonic Boom / Hammer Fall /
       Stinger Aim / イルカさん・横. Dashed back, solid forward arrow. -->
  <symbol id="m-charge46" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M6,16 L18,16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="2 2.5" opacity="0.55"/>
    <path d="M11,16 L24,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 2溜め8 (down-charge → up) — Flash Kick / 縦イルカ /
       Carcass Slide. Dashed down, solid up arrow. -->
  <symbol id="m-charge28" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M16,26 L16,14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="2 2.5" opacity="0.55"/>
    <path d="M16,21 L16,8" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M11,10 L16,2 L21,10 Z" fill="currentColor"/>
  </symbol>

  <!-- 360 / 一回転 (full rotation grab) — Pile Driver /
       ポチョムキンバスター. Closed circle with arrowhead. -->
  <symbol id="m-360" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <circle cx="16" cy="16" r="9" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <path d="M22,11 L26,16 L21,18 Z" fill="currentColor"/>
  </symbol>

  <!-- 8方向半回転 — Behemoth Typhoon (any direction + HS, 8 variants).
       Star/compass with arrowheads in 8 directions. -->
  <symbol id="m-8way" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <g fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M16,8 L16,24"/>
      <path d="M8,16 L24,16"/>
      <path d="M10.5,10.5 L21.5,21.5"/>
      <path d="M21.5,10.5 L10.5,21.5"/>
    </g>
    <g fill="currentColor">
      <path d="M13.5,9.5 L16,5 L18.5,9.5 Z"/>
      <path d="M22.5,13.5 L27,16 L22.5,18.5 Z"/>
      <path d="M13.5,22.5 L16,27 L18.5,22.5 Z"/>
      <path d="M9.5,13.5 L5,16 L9.5,18.5 Z"/>
    </g>
  </symbol>
</svg>
