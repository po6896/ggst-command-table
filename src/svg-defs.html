<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- Stick base ring; subtle dark disc that frames the motion -->
    <g id="stick-base">
      <circle cx="16" cy="16" r="14.5" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <circle cx="16" cy="16" r="1.4" fill="rgba(255,255,255,0.25)"/>
    </g>

  </defs>

  <!-- 8-direction layout (viewBox 32x32):
       1 (6,26)  2 (16,26)  3 (26,26)
       4 (6,16)  5 (16,16)  6 (26,16)
       7 (6,6)   8 (16,6)   9 (26,6)   -->

  <!-- 236 (QCF) — ends at 6 (forward), arrow points right -->
  <symbol id="m-qcf" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M16,26 Q26,26 26,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 214 (QCB) — ends at 4 (back), arrow points left -->
  <symbol id="m-qcb" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M16,26 Q6,26 6,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10,11 L2,16 L10,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 623 (DP) — ends at 3 (down-forward), arrow points down-right -->
  <symbol id="m-dp" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M26,16 L16,26 L26,26" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30,22 L30,30 L22,30 Z" fill="currentColor"/>
  </symbol>

  <!-- 41236 (HCF) — ends at 6 (forward), arrow points right -->
  <symbol id="m-hcf" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M6,16 Q6,26 16,26 Q26,26 26,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 632146 (HCB → F) — half-circle back along the BOTTOM
       semicircle (lever sweeps through 3, 2, 1), then a forward
       thrust back to 6 with an explicit arrowhead. -->
  <symbol id="m-hcb-f" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <!-- HCB arc: 6 → 3 → 2 → 1 → 4 (sweep flag 1 = clockwise = bottom) -->
    <path d="M26,16 A10,10 0 0 1 6,16" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/>
    <!-- Forward thrust 4 → 6 -->
    <path d="M8,16 L24,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"/>
    <!-- End arrowhead at 6 -->
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- 236236 — handled in markup as a single QCF icon plus an
       external "×2" repeat token. -->
  <symbol id="m-qcf2" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M16,26 Q26,26 26,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
  </symbol>

  <!-- ←/→ direction (throw etc.) — both ends are arrowheads -->
  <symbol id="m-dir" viewBox="0 0 32 32">
    <use href="#stick-base"/>
    <path d="M8,16 L24,16" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M22,11 L30,16 L22,21 Z" fill="currentColor"/>
    <path d="M10,11 L2,16 L10,21 Z" fill="currentColor"/>
  </symbol>

  <!-- Generic button (no motion) -->
  <symbol id="m-button" viewBox="0 0 32 32">
    <circle cx="16" cy="16" r="11" fill="rgba(255,255,255,0.025)" stroke="currentColor" stroke-width="1.6" opacity="0.5"/>
    <circle cx="16" cy="16" r="5.5" fill="currentColor"/>
    <circle cx="16" cy="16" r="2" fill="rgba(255,255,255,0.85)"/>
  </symbol>
</svg>
